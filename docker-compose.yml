services:
  app:
    build: .
    environment:
      - DB_PATH=/data/paper.db
      - STAFF_PASSWORD=${STAFF_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - BASE_PATH=${BASE_PATH}
    volumes:
      - ./data:/data
      - ./config:/srv/config:ro
    ports:
      - "26223:8000"
    restart: unless-stopped
