services:
  app:
    build: .
    environment:
      - DB_PATH=/data/paper.db
      - STAFF_PASSWORD=${STAFF_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ./data:/data
      - ./config:/config:ro
    expose:
      - "8000"
    restart: unless-stopped
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend:/srv/frontend:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
