<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paper Market — Teller</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>

<div id="toast"></div>

<!-- ── Login ────────────────────────────────── -->
<div id="login-section" class="login-wrap">
  <div class="login-box">
    <h1>Teller Login</h1>
    <div class="field">
      <label for="staff-pw">Staff Password</label>
      <input id="staff-pw" type="password" autocomplete="current-password" placeholder="Password" />
    </div>
    <button id="login-btn" class="btn btn--primary btn--full">Log in</button>
  </div>
</div>

<!-- ── App ──────────────────────────────────── -->
<div id="app-section" class="hidden" style="max-width:680px;margin:0 auto;padding:20px 16px;">
  <div class="page-header">
    <h1>Teller Station</h1>
    <button id="export-btn" class="btn btn--neutral btn--sm">Export CSV</button>
  </div>

  <!-- Member Lookup -->
  <div class="card">
    <h2>Member Lookup</h2>
    <div class="inline-form">
      <div style="flex:1">
        <label for="member-id-input">Member ID</label>
        <input id="member-id-input" type="text" placeholder="e.g. 0-1" />
      </div>
      <button id="lookup-btn" class="btn btn--primary" style="margin-top:20px">Lookup</button>
    </div>
  </div>

  <!-- Member info panel (hidden until lookup) -->
  <div id="member-panel" class="hidden">

    <!-- Locked -->
    <div id="locked-panel" class="hidden card">
      <div class="locked-badge">
        <div>Member is in cooldown</div>
        <div class="countdown" id="countdown-display">—</div>
        <div class="muted" style="margin-top:4px;font-size:.8rem">seconds remaining</div>
      </div>
    </div>

    <!-- Unlocked -->
    <div id="unlocked-panel" class="hidden">

      <div class="card">
        <h2 id="member-title">Member</h2>
        <div class="stats-row">
          <div class="stat-box">
            <div class="label">Balance</div>
            <div class="value money" id="m-balance">—</div>
          </div>
          <div class="stat-box">
            <div class="label">Debt</div>
            <div class="value money neg" id="m-debt">—</div>
          </div>
        </div>
        <div class="muted" id="m-relief-status"></div>
      </div>

      <!-- Holdings -->
      <div class="card" id="m-holdings-card">
        <h2>Holdings</h2>
        <div id="m-holdings-list" class="muted">None.</div>
      </div>

      <!-- Fixed Deposits -->
      <div class="card">
        <h2>Fixed Deposits</h2>
        <div id="m-fd-list" class="muted">None.</div>
      </div>

      <!-- Operations -->
      <div class="card">
        <h2>Cash Operations</h2>

        <div class="section-title">Deposit / Withdraw</div>
        <div class="ops-grid" style="margin-bottom:14px">
          <div>
            <label>Amount</label>
            <div class="row" style="gap:6px">
              <input type="number" min="1" id="deposit-amt" placeholder="Amount" />
              <button class="btn btn--success btn--sm" id="deposit-btn">Deposit</button>
            </div>
          </div>
          <div>
            <label>Amount</label>
            <div class="row" style="gap:6px">
              <input type="number" min="1" id="withdraw-amt" placeholder="Amount" />
              <button class="btn btn--danger btn--sm" id="withdraw-btn">Withdraw</button>
            </div>
          </div>
        </div>

        <div class="section-title">Loan / Repay</div>
        <div class="ops-grid" style="margin-bottom:14px">
          <div>
            <label>Amount</label>
            <div class="row" style="gap:6px">
              <input type="number" min="1" id="loan-amt" placeholder="Amount" />
              <button class="btn btn--primary btn--sm" id="loan-btn">Issue Loan</button>
            </div>
          </div>
          <div>
            <label>Amount</label>
            <div class="row" style="gap:6px">
              <input type="number" min="1" id="repay-amt" placeholder="Amount" />
              <button class="btn btn--neutral btn--sm" id="repay-btn">Repay</button>
            </div>
          </div>
        </div>

        <div class="section-title">Relief</div>
        <div style="margin-bottom:14px">
          <button class="btn btn--primary btn--sm" id="relief-btn">Claim Relief</button>
          <span class="muted" id="relief-note" style="margin-left:8px;font-size:.82rem;"></span>
        </div>
      </div>

      <!-- Fixed Deposit Ops -->
      <div class="card">
        <h2>Fixed Deposit Operations</h2>

        <div class="section-title">Open FD</div>
        <div class="ops-grid" style="margin-bottom:14px">
          <div class="field">
            <label>Principal</label>
            <input type="number" min="1" id="fd-principal" placeholder="Amount" />
          </div>
          <div class="field">
            <label>Term (minutes)</label>
            <input type="number" min="1" id="fd-term" placeholder="e.g. 30" />
          </div>
        </div>
        <button class="btn btn--primary btn--sm" id="fd-open-btn">Open FD</button>

        <div class="section-title" style="margin-top:14px">Close FD</div>
        <div class="inline-form">
          <div style="flex:1">
            <label>FD ID</label>
            <input type="text" id="fd-close-id" placeholder="fd-id" />
          </div>
          <button class="btn btn--danger btn--sm" id="fd-close-btn" style="margin-top:20px">Close FD</button>
        </div>
      </div>

      <!-- Trade on behalf -->
      <div class="card">
        <h2>Trade on Behalf</h2>
        <div class="ops-grid" style="margin-bottom:10px">
          <div class="field">
            <label>Stock ID</label>
            <input type="text" id="trade-stock" placeholder="e.g. S1" />
          </div>
          <div class="field">
            <label>Shares</label>
            <input type="number" min="1" id="trade-shares" placeholder="Qty" />
          </div>
        </div>
        <div class="row" style="gap:8px">
          <button class="btn btn--success btn--sm" id="trade-buy-btn">Buy</button>
          <button class="btn btn--danger btn--sm"  id="trade-sell-btn">Sell</button>
        </div>
      </div>

    </div><!-- /unlocked-panel -->
  </div><!-- /member-panel -->

  <!-- Event Control -->
  <div class="card" id="event-control-card">
    <h2>Event Control</h2>
    <div id="event-status-line" class="muted" style="margin-bottom:10px;"></div>
    <button class="btn btn--success btn--sm" id="start-event-btn" style="display:none;">Start Event</button>
  </div>

  <!-- News Publish -->
  <div class="card">
    <h2>Publish News</h2>
    <div class="field">
      <label for="news-text">News Text</label>
      <input type="text" id="news-text" placeholder="Market announcement..." />
    </div>
    <button class="btn btn--primary btn--sm" id="news-btn">Publish</button>
  </div>

</div><!-- /app-section -->

<script type="module" src="/js/teller.js"></script>
</body>
</html>
