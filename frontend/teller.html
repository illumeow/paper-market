<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paper Market — Teller</title>
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/teller.css" />
</head>
<body>

<div id="toast"></div>

<!-- ── Login ────────────────────────────────── -->
<div id="login-section" class="login-wrap">
  <div class="login-box">
    <h1>Teller Login 🥥</h1>
    <div class="field">
      <label for="staff-pw">Staff Password</label>
      <input id="staff-pw" type="password" autocomplete="current-password" placeholder="Password" />
    </div>
    <button id="login-btn" class="btn btn--primary btn--full">Log in</button>
  </div>
</div>

<!-- ── App ──────────────────────────────────── -->
<div id="app-section" class="hidden" style="max-width:680px;margin:0 auto;padding:20px 16px;">
  <div class="page-header">
    <h1>Teller Station</h1>
    <div class="header-actions">
      <button id="export-btn" class="btn btn--neutral btn--sm">Export CSV</button>
      <button id="logout-btn" class="btn btn--neutral btn--sm">Log out</button>
    </div>
  </div>

  <!-- Member Lookup -->
  <div class="card">
    <h2>Member Lookup</h2>
    <div class="inline-form">
      <div style="flex:1">
        <input id="member-id-input" type="text" inputmode="numeric" maxlength="4"
               autocomplete="off" placeholder="Member PIN" />
      </div>
      <button id="lookup-btn" class="btn btn--primary">Lookup</button>
      <button id="close-lookup-btn" class="btn btn--neutral">Close</button>
    </div>
  </div>

  <!-- Member info panel (hidden until lookup) -->
  <div id="member-panel" class="hidden">

    <!-- Locked -->
    <div id="locked-panel" class="hidden card">
      <div class="locked-badge">
        <div>Member is in cooldown</div>
        <div class="countdown" id="countdown-display">—</div>
        <div class="muted" style="margin-top:4px;font-size:.8rem">seconds remaining</div>
      </div>
    </div>

    <!-- Unlocked -->
    <div id="unlocked-panel" class="hidden">

      <div class="card">
        <h2 id="member-title">Member</h2>
        <div class="stats-row">
          <div class="stat-box">
            <div class="label">Balance</div>
            <div class="value money" id="m-balance">—</div>
          </div>
          <div class="stat-box">
            <div class="label">Debt</div>
            <div class="value money neg" id="m-debt">—</div>
          </div>
        </div>
      </div>

      <!-- Operations -->
      <div class="card">
        <h2>Cash Operations</h2>

        <div class="section-title">Deposit / Withdraw</div>
        <div class="ops-grid" style="margin-bottom:14px">
          <div class="row" style="gap:6px">
            <input type="number" min="1" id="deposit-amt" placeholder="Amount" style="flex:1;min-width:0" />
            <button class="btn btn--success btn--sm btn--w95 btn--input-h" id="deposit-btn">Deposit</button>
          </div>
          <div class="row" style="gap:6px">
            <input type="number" min="1" id="withdraw-amt" placeholder="Amount" style="flex:1;min-width:0" />
            <button class="btn btn--danger btn--sm btn--w95 btn--input-h" id="withdraw-btn">Withdraw</button>
          </div>
        </div>

        <div class="section-title">Loan / Repay</div>
        <div style="margin-bottom:14px">
          <div class="row" style="gap:6px;flex-wrap:nowrap">
            <input type="number" min="1" id="loan-repay-amt" placeholder="Amount" style="flex:1;min-width:0" />
            <button class="btn btn--primary btn--sm btn--w95 btn--input-h" id="loan-repay-btn">Issue Loan</button>
            <button class="btn btn--neutral btn--sm btn--w95 btn--input-h" id="settle-btn" style="display:none;">Settle</button>
          </div>
        </div>

      </div>

      <!-- Fixed Deposits (display + open form / close button, built by teller.js) -->
      <div class="card">
        <h2>Fixed Deposits</h2>
        <div id="m-fd-list" class="muted"></div>
        <div id="fd-ops"></div>
      </div>

      <!-- Trade on behalf -->
      <div class="card">
        <h2>Trade on Behalf</h2>
        <div class="row" style="gap:6px;flex-wrap:nowrap">
          <select id="trade-stock" style="flex:1;min-width:0"></select>
          <input type="number" min="1" id="trade-shares" placeholder="Quantity" style="width:100px;flex:0 0 auto" />
          <button class="btn btn--success btn--sm btn--input-h" id="trade-buy-btn">Buy</button>
          <button class="btn btn--danger btn--sm btn--input-h"  id="trade-sell-btn">Sell</button>
        </div>
      </div>

      <!-- Holdings -->
      <div class="card" id="m-holdings-card">
        <h2>Holdings</h2>
        <div id="m-holdings-list" class="muted">None.</div>
      </div>

    </div><!-- /unlocked-panel -->
  </div><!-- /member-panel -->

  <!-- News Publish -->
  <div class="card">
    <h2>Publish News</h2>
    <div class="row" style="gap:6px">
      <input type="text" id="news-text" placeholder="Market announcement..." style="flex:1" />
      <button class="btn btn--primary btn--sm btn--w95 btn--input-h" id="news-btn">Publish</button>
    </div>
  </div>

  <!-- Event Control (kept at the bottom — the rarely-touched master switch) -->
  <div class="card" id="event-control-card">
    <h2>Event Control</h2>
    <div class="row row--between">
      <span id="event-status-line" class="muted"></span>
      <div class="row" style="gap:6px;flex-wrap:nowrap">
        <button class="btn btn--success btn--sm" id="start-event-btn" style="display:none;">Start Event</button>
        <button class="btn btn--danger btn--sm" id="stop-event-btn" style="display:none;">Pause Event</button>
      </div>
    </div>
  </div>

</div><!-- /app-section -->

<script type="module" src="js/teller.js"></script>
</body>
</html>
